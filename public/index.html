<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Local Chatbot</title>
    <link rel="stylesheet" href="/styles.css">
  </head>
  <body>
    <button id="exitFocus" class="focus-exit hidden" type="button">Exit focus</button>
    <main class="shell">
      <section class="app">
        <aside class="sidebar">
          <div class="brand">
            <p class="eyebrow">Local chatbot</p>
            <h1>M3 Desk Companion</h1>
          </div>
          <button id="newChat" class="primary-rail-button" type="button" aria-label="Start new chat">New chat</button>
          <div class="chat-actions" aria-label="Chat actions">
            <button id="renameChat" class="icon-button" type="button" aria-label="Rename chat">Rename</button>
            <button id="deleteChat" class="icon-button danger-button" type="button" aria-label="Delete chat">Delete</button>
            <button id="exportChat" class="icon-button" type="button" aria-label="Export chat">Export</button>
            <button id="hideChat" class="icon-button" type="button" aria-label="Hide chat">Hide</button>
            <button id="showHidden" class="icon-button" type="button" aria-label="Show hidden chats">Hidden</button>
            <button id="focusMode" class="icon-button" type="button" aria-label="Toggle focus mode">Focus</button>
          </div>
          <nav id="conversationList" class="conversation-list" aria-label="Saved chats"></nav>
        </aside>

        <section class="chat">
          <header class="topbar">
            <div class="chat-heading">
              <p id="activeTitle" class="chat-title">New chat</p>
              <p id="status" class="status">Ready on llama3.2:3b</p>
            </div>
            <div class="controls">
              <label class="toggle">
                <input id="demoMode" type="checkbox">
                <span>Demo</span>
              </label>
              <select id="model" aria-label="Model name">
                <option value="llama3.2:3b">llama3.2:3b</option>
              </select>
              <button id="regenerate" class="secondary-button" type="button" aria-label="Regenerate response">Regenerate</button>
            </div>
          </header>

          <div id="messages" class="messages" aria-live="polite"></div>
          <section id="imagePanel" class="image-panel" aria-label="Image generation">
            <div class="image-panel-header">
              <div>
                <p class="panel-kicker">Chat image mode</p>
                <h2>Use /image, or ask for a photo</h2>
              </div>
              <label class="image-field">
                <span>Provider</span>
                <select id="imageProvider">
                  <option value="comfyui">ComfyUI local</option>
                  <option value="cloud">Cloud fallback</option>
                </select>
              </label>
              <label class="image-field">
                <span>Size</span>
                <select id="imageSize">
                  <option value="1024x1024">1024 x 1024</option>
                  <option value="832x1216">832 x 1216</option>
                  <option value="1216x832">1216 x 832</option>
                </select>
              </label>
              <label class="image-field checkpoint-field">
                <span>Checkpoint</span>
                <input id="checkpointName" type="text" value="juggernautXL_v9Rdphoto2Lightning.safetensors" spellcheck="false">
              </label>
            </div>
          </section>
          <div id="documents" class="documents hidden" aria-label="Attached documents"></div>

          <form id="composer" class="composer">
            <label class="attach-button" for="fileUpload" aria-label="Attach document">Attach</label>
            <input id="fileUpload" class="file-input" type="file" accept=".pdf,.docx,.txt,.md,.csv,.json,.js,.ts,.tsx,.jsx,.html,.css,.py,.java,.sql,.log,text/*,application/pdf,application/vnd.openxmlformats-officedocument.wordprocessingml.document">
            <textarea id="prompt" rows="1" placeholder="Ask anything..." autofocus></textarea>
            <button id="stop" class="secondary-button hidden" type="button" aria-label="Stop response">Stop</button>
            <button id="send" type="submit" aria-label="Send message">
              <span>Send</span>
            </button>
          </form>
        </section>
      </section>
    </main>
    <script src="/app.js" type="module"></script>
  </body>
</html>
