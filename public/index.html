<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Local Chatbot</title>
    <link rel="stylesheet" href="/styles.css">
  </head>
  <body>
    <button id="exitFocus" class="focus-exit hidden" type="button">Exit focus</button>
    <section id="cameraModal" class="camera-modal hidden" aria-label="Camera capture" aria-modal="true">
      <div class="camera-sheet">
        <header class="camera-header">
          <div>
            <p class="camera-kicker">Style reference</p>
            <h2>Take a photo</h2>
          </div>
          <button id="closeCamera" class="secondary-button" type="button" aria-label="Close camera">Close</button>
        </header>
        <video id="cameraPreview" class="camera-preview" autoplay playsinline muted></video>
        <canvas id="cameraCanvas" class="hidden"></canvas>
        <div class="camera-actions">
          <button id="capturePhoto" class="secondary-button" type="button">Capture</button>
          <button id="usePhoto" type="button" disabled>Use photo</button>
        </div>
      </div>
    </section>
    <main class="shell">
      <section class="app">
        <aside class="sidebar">
          <div class="brand">
            <p class="eyebrow">Local chatbot</p>
            <h1>M3 Desk Companion</h1>
          </div>
          <button id="newChat" class="primary-rail-button" type="button" aria-label="Start new chat">New chat</button>
          <div class="chat-actions" aria-label="Chat actions">
            <button id="renameChat" class="icon-button" type="button" aria-label="Rename chat">Rename</button>
            <button id="deleteChat" class="icon-button danger-button" type="button" aria-label="Delete chat">Delete</button>
            <button id="exportChat" class="icon-button" type="button" aria-label="Export chat">Export</button>
            <button id="hideChat" class="icon-button" type="button" aria-label="Hide chat">Hide</button>
            <button id="showHidden" class="icon-button" type="button" aria-label="Show hidden chats">Hidden</button>
            <button id="focusMode" class="icon-button" type="button" aria-label="Toggle focus mode">Focus</button>
          </div>
          <nav id="conversationList" class="conversation-list" aria-label="Saved chats"></nav>
        </aside>

        <section class="chat">
          <header class="topbar">
            <div class="chat-heading">
              <p id="activeTitle" class="chat-title">New chat</p>
              <p id="status" class="status">Ready</p>
            </div>
            <div class="controls">
              <button id="settingsToggle" class="secondary-button" type="button" aria-label="Open settings">Settings</button>
              <button id="regenerate" class="secondary-button" type="button" aria-label="Regenerate response">Regenerate</button>
            </div>
          </header>

          <section id="settingsPanel" class="settings-panel hidden" aria-label="Assistant settings">
            <div class="settings-grid">
              <label class="toggle">
                <input id="demoMode" type="checkbox">
                <span>Demo</span>
              </label>
              <label class="setting-field">
                <span>Chat model</span>
                <select id="model" aria-label="Model name">
                  <option value="llama3.2:3b">llama3.2:3b</option>
                </select>
              </label>
              <label class="setting-field">
                <span>Image engine</span>
                <select id="imageProvider">
                  <option value="auto">Auto</option>
                  <option value="comfyui">ComfyUI only</option>
                  <option value="cloud">Cloud fallback</option>
                </select>
              </label>
              <label class="setting-field">
                <span>Size</span>
                <select id="imageSize">
                  <option value="512x512">512 x 512</option>
                  <option value="768x768">768 x 768</option>
                  <option value="1024x1024">1024 x 1024</option>
                  <option value="832x1216">832 x 1216</option>
                  <option value="1216x832">1216 x 832</option>
                </select>
              </label>
              <label class="setting-field checkpoint-field">
                <span>Checkpoint</span>
                <input id="checkpointName" type="text" value="juggernautXL_v9Rdphoto2Lightning.safetensors" spellcheck="false">
              </label>
            </div>
          </section>

          <div id="messages" class="messages" aria-live="polite"></div>
          <div id="documents" class="documents hidden" aria-label="Attached documents"></div>

          <form id="composer" class="composer">
            <label class="attach-button" for="fileUpload" aria-label="Upload image or document">Upload</label>
            <input id="fileUpload" class="file-input" type="file" accept="image/png,image/jpeg,image/webp,.png,.jpg,.jpeg,.webp,.pdf,.docx,.txt,.md,.csv,.json,.js,.ts,.tsx,.jsx,.html,.css,.py,.java,.sql,.log,text/*,application/pdf,application/vnd.openxmlformats-officedocument.wordprocessingml.document">
            <button id="cameraButton" class="attach-button" type="button" aria-label="Take reference photo">Take photo</button>
            <textarea id="prompt" rows="1" placeholder="Ask anything, or ask for a photo..." autofocus></textarea>
            <button id="stop" class="secondary-button hidden" type="button" aria-label="Stop response">Stop</button>
            <button id="send" type="submit" aria-label="Send message">
              <span>Send</span>
            </button>
          </form>
        </section>
      </section>
    </main>
    <script src="/app.js" type="module"></script>
  </body>
</html>
